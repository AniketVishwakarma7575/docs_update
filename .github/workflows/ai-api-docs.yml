name: Update API documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - API_DOCS.md

permissions:
  contents: write

concurrency:
  group: api-docs-main
  cancel-in-progress: false

jobs:
  update-api-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out updated main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate Markdown and update Google Docs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_SA_KEY_BASE64: ${{ secrets.GOOGLE_SA_KEY_BASE64 }}
          AI_SOURCE_DIR: ${{ github.workspace }}
          AI_API_DOCS_PATH: ${{ github.workspace }}/API_DOCS.md
          AI_DOCS_MAX_SOURCE_CHARS: 120000
          AI_DOCS_MAX_OUTPUT_TOKENS: 16000
          AI_DOCS_MAX_CONTINUATIONS: 3
        run: npm run docs:ai-sync

      - name: Commit generated API documentation
        run: |
          if git diff --quiet -- API_DOCS.md; then
            echo "API documentation is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add API_DOCS.md
          git commit -m "docs: update API documentation [skip ci]"
          git push origin HEAD:main
